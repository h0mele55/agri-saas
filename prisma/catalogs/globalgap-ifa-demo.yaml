# Illustrative concept-only subset of a GLOBALG.A.P.-style Integrated
# Farm Assurance (IFA) crop-certification scheme, modelled as an
# AG_SCHEME Framework so the certification surface (control↔requirement
# mapping, readiness scoring, coverage, auto-evidence) works against it
# verbatim.
#
# LICENSE NOTE: every control-point title below is PARAPHRASED generic
# wording authored for this demo. None of it is the official
# GLOBALG.A.P. checklist text, and the control-point codes are
# illustrative analogues, not verbatim reproductions of the proprietary
# standard. Do not treat this file as the real checklist.
framework:
  key: GLOBALGAP-IFA-DEMO
  name: GlobalG.A.P. IFA (illustrative demo)
  version: "2024-demo"
  kind: AG_SCHEME
  description: >-
    Illustrative concept-only subset — not the official GLOBALG.A.P.
    checklist. Paraphrased generic control points for an Integrated Farm
    Assurance crop scheme, used to demonstrate practice-to-requirement
    mapping and auto-evidence from farm records.

requirements:
  # ── AF — All Farm Base ──
  - code: AF.1.1
    title: Farm site history and field records are retained and retrievable
    summary: >-
      The producer keeps records of each production site's history and
      can retrieve them for the relevant retention period.
    theme: All Farm Base
    themeNumber: 1
    section: AF.1
    sortOrder: 1
  - code: AF.4.1
    title: A documented risk assessment covers worker health, safety, and hygiene
    summary: >-
      A current risk assessment addresses the main health, safety, and
      hygiene risks of the operation and is reviewed periodically.
    theme: All Farm Base
    themeNumber: 4
    section: AF.4
    sortOrder: 2

  # ── CB — Crop Base / Plant Protection ──
  - code: CB.7.1
    title: Plant protection products applied are authorised for the target crop
    summary: >-
      Only plant protection products that are authorised in the country
      of production for the treated crop are applied.
    theme: Plant Protection
    themeNumber: 7
    section: CB.7
    sortOrder: 3
  - code: CB.7.6
    title: Each application is recorded with date, product, rate, operator, and target
    summary: >-
      A record of every plant protection application captures the date,
      the product and its rate, the operator, and the crop/area treated.
    theme: Plant Protection
    themeNumber: 7
    section: CB.7
    sortOrder: 4
  - code: CB.7.9
    title: The pre-harvest interval is observed for every application
    summary: >-
      The interval between the last application and harvest meets or
      exceeds the product's stated pre-harvest interval for the crop.
    theme: Plant Protection
    themeNumber: 7
    section: CB.7
    sortOrder: 5

  # ── FV — Fruit & Vegetables ──
  - code: FV.5.1
    title: Pre-harvest water sources are risk-assessed for produce safety
    summary: >-
      Water used close to harvest is risk-assessed for microbial and
      chemical hazards appropriate to the crop and its end use.
    theme: Fruit and Vegetables
    themeNumber: 5
    section: FV.5
    sortOrder: 6
  - code: FV.5.4
    title: Harvest hygiene practices prevent produce contamination
    summary: >-
      Documented harvest hygiene practices reduce the risk of physical,
      chemical, and microbial contamination during harvest and handling.
    theme: Fruit and Vegetables
    themeNumber: 5
    section: FV.5
    sortOrder: 7

templates:
  - code: GG-IFA.AF.1.1
    title: Site history and field record-keeping
    category: All Farm Base
    defaultFrequency: ANNUALLY
    requirementCodes: [AF.1.1]
  - code: GG-IFA.AF.4.1
    title: Worker health, safety, and hygiene risk assessment
    category: All Farm Base
    defaultFrequency: ANNUALLY
    requirementCodes: [AF.4.1]
  - code: GG-IFA.CB.7
    title: Plant protection product use and application records
    category: Plant Protection
    defaultFrequency: AD_HOC
    requirementCodes: [CB.7.1, CB.7.6, CB.7.9]
  - code: GG-IFA.FV.5
    title: Harvest hygiene and pre-harvest water safety
    category: Fruit and Vegetables
    defaultFrequency: ANNUALLY
    requirementCodes: [FV.5.1, FV.5.4]

pack:
  key: GLOBALGAP-IFA-DEMO-BASE
  name: GlobalG.A.P. IFA demo starter pack
  version: "2024-demo"
  description: >-
    Illustrative starter pack for the concept-only GlobalG.A.P. IFA demo
    scheme — installs controls for the farm-base, plant-protection, and
    fruit-and-vegetable control points above.
  templateCodes: [GG-IFA.AF.1.1, GG-IFA.AF.4.1, GG-IFA.CB.7, GG-IFA.FV.5]
