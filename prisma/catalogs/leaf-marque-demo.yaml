# Illustrative concept-only subset of a LEAF-Marque-style Integrated
# Farm Management (IFM) sustainability-assurance scheme, modelled as an
# AG_SCHEME Framework so the certification surface (control↔requirement
# mapping, readiness scoring, coverage, auto-evidence) works against it
# verbatim.
#
# LICENSE NOTE: every control-point title below is PARAPHRASED generic
# wording authored for this demo. None of it is the official LEAF Marque
# standard text, and the control-point codes (LM.*) are illustrative
# analogues, not verbatim reproductions of any proprietary standard. Do
# not treat this file as the real standard — it is an illustrative
# teaching aid for the integrated-farm-management concept, not a
# compliance checklist.
framework:
  key: LEAF-MARQUE-DEMO
  name: LEAF Marque IFM (illustrative demo)
  version: "2024-demo"
  kind: AG_SCHEME
  description: >-
    Illustrative concept-only subset — NOT the official LEAF Marque
    standard. Paraphrased generic control points for an Integrated Farm
    Management sustainability scheme (soil, water, biodiversity, energy,
    inputs), used to demonstrate practice-to-requirement mapping and
    auto-evidence from farm records.

requirements:
  # ── IFM — Whole-farm planning & policy ──
  - code: LM.1.1
    title: A whole-farm sustainability plan is documented and reviewed annually
    summary: >-
      The business maintains a written integrated-farm-management plan
      covering its sustainability objectives, and reviews it at least
      once a year.
    theme: Farm Management
    themeNumber: 1
    section: LM.1
    sortOrder: 1
  - code: LM.1.2
    title: Continuous-improvement targets are set and progress is recorded
    summary: >-
      Measurable improvement targets are set for the main impact areas
      and the business records its progress against them over time.
    theme: Farm Management
    themeNumber: 1
    section: LM.1
    sortOrder: 2

  # ── Soil management & fertility ──
  - code: LM.2.1
    title: A soil-management plan maintains structure and organic matter
    summary: >-
      A documented soil-management plan addresses structure, organic
      matter, and erosion risk for each cropped area.
    theme: Soil Management
    themeNumber: 2
    section: LM.2
    sortOrder: 3
  - code: LM.2.2
    title: Nutrient applications follow a plan based on soil analysis
    summary: >-
      Fertiliser and manure applications are planned from periodic soil
      analysis and crop requirement, and the rates applied are recorded.
    theme: Soil Management
    themeNumber: 2
    section: LM.2
    sortOrder: 4

  # ── Crop health & protection ──
  - code: LM.3.1
    title: Integrated pest management is applied before chemical control
    summary: >-
      Cultural, biological, and monitoring-based controls are considered
      and used where practical before a plant-protection product is
      applied.
    theme: Crop Health
    themeNumber: 3
    section: LM.3
    sortOrder: 5
  - code: LM.3.2
    title: Plant-protection applications are justified and fully recorded
    summary: >-
      Each plant-protection application is justified by a monitored need
      and recorded with date, product, rate, operator, and target area.
    theme: Crop Health
    themeNumber: 3
    section: LM.3
    sortOrder: 6

  # ── Water management ──
  - code: LM.4.1
    title: A water-management plan addresses use efficiency and quality
    summary: >-
      The business plans its water abstraction and irrigation for
      efficiency and protects water quality from input run-off.
    theme: Water Management
    themeNumber: 4
    section: LM.4
    sortOrder: 7

  # ── Energy & carbon ──
  - code: LM.5.1
    title: Energy use is monitored and efficiency measures are identified
    summary: >-
      The business records its energy use and identifies practical
      measures to reduce consumption and associated emissions.
    theme: Energy and Carbon
    themeNumber: 5
    section: LM.5
    sortOrder: 8

  # ── Biodiversity & landscape ──
  - code: LM.6.1
    title: A biodiversity plan protects and enhances on-farm habitats
    summary: >-
      A documented plan identifies and manages habitats and landscape
      features to maintain and enhance on-farm biodiversity.
    theme: Biodiversity
    themeNumber: 6
    section: LM.6
    sortOrder: 9

  # ── Pollution control & waste ──
  - code: LM.7.1
    title: Fuels, inputs, and waste are stored to prevent pollution
    summary: >-
      Fuels, plant-protection products, fertilisers, and farm waste are
      stored and handled to prevent soil and water contamination.
    theme: Pollution Control
    themeNumber: 7
    section: LM.7
    sortOrder: 10

  # ── Community & engagement ──
  - code: LM.8.1
    title: Worker training and community engagement are documented
    summary: >-
      Training of workers on the scheme's practices and the business's
      community-engagement activity are recorded.
    theme: People and Community
    themeNumber: 8
    section: LM.8
    sortOrder: 11

templates:
  - code: LM-DEMO.1
    title: Whole-farm sustainability plan and improvement targets
    category: Farm Management
    defaultFrequency: ANNUALLY
    requirementCodes: [LM.1.1, LM.1.2]
  - code: LM-DEMO.2
    title: Soil management and nutrient planning
    category: Soil Management
    defaultFrequency: ANNUALLY
    requirementCodes: [LM.2.1, LM.2.2]
  - code: LM-DEMO.3
    title: Integrated pest management and application records
    category: Crop Health
    defaultFrequency: AD_HOC
    requirementCodes: [LM.3.1, LM.3.2]
  - code: LM-DEMO.4
    title: Water-management planning
    category: Water Management
    defaultFrequency: ANNUALLY
    requirementCodes: [LM.4.1]
  - code: LM-DEMO.5
    title: Energy and carbon monitoring
    category: Energy and Carbon
    defaultFrequency: ANNUALLY
    requirementCodes: [LM.5.1]
  - code: LM-DEMO.6
    title: Biodiversity and habitat management
    category: Biodiversity
    defaultFrequency: ANNUALLY
    requirementCodes: [LM.6.1]
  - code: LM-DEMO.7
    title: Pollution control and waste storage
    category: Pollution Control
    defaultFrequency: ANNUALLY
    requirementCodes: [LM.7.1]
  - code: LM-DEMO.8
    title: Worker training and community engagement
    category: People and Community
    defaultFrequency: ANNUALLY
    requirementCodes: [LM.8.1]

pack:
  key: LEAF-MARQUE-DEMO-BASE
  name: LEAF Marque IFM demo starter pack
  version: "2024-demo"
  description: >-
    Illustrative starter pack for the concept-only LEAF Marque IFM demo
    scheme — installs controls for whole-farm planning, soil, crop
    health, water, energy, biodiversity, pollution control, and people
    above.
  templateCodes:
    [LM-DEMO.1, LM-DEMO.2, LM-DEMO.3, LM-DEMO.4, LM-DEMO.5, LM-DEMO.6, LM-DEMO.7, LM-DEMO.8]
