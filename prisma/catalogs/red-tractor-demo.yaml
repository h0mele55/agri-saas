# Illustrative concept-only subset of a Red-Tractor-style farm-assurance
# scheme (combinable crops & sugar beet archetype), modelled as an
# AG_SCHEME Framework so the certification surface (control↔requirement
# mapping, readiness scoring, coverage, auto-evidence) works against it
# verbatim.
#
# LICENSE NOTE: every control-point title below is PARAPHRASED generic
# wording authored for this demo. None of it is the official Red Tractor
# / Assured Food Standards scheme text, and the control-point codes
# (RT.*) are illustrative analogues, not verbatim reproductions of any
# proprietary standard. Do not treat this file as the real standard — it
# is an illustrative teaching aid for the farm-assurance concept, not a
# compliance checklist.
framework:
  key: RED-TRACTOR-DEMO
  name: Red Tractor Combinable Crops (illustrative demo)
  version: "2024-demo"
  kind: AG_SCHEME
  description: >-
    Illustrative concept-only subset — NOT the official Red Tractor
    standard. Paraphrased generic control points for a combinable-crops
    farm-assurance scheme (traceability, inputs, storage, hygiene,
    haulage), used to demonstrate practice-to-requirement mapping and
    auto-evidence from farm records.

requirements:
  # ── Records & traceability ──
  - code: RT.1.1
    title: Cropping and field operations are recorded and retrievable
    summary: >-
      Records of cropping, cultivations, and field operations are kept
      per field and can be retrieved for the scheme's retention period.
    theme: Records and Traceability
    themeNumber: 1
    section: RT.1
    sortOrder: 1
  - code: RT.1.2
    title: Harvested batches are traceable from field to dispatch
    summary: >-
      Each harvested batch can be traced back to its field of origin and
      forward to the point of dispatch.
    theme: Records and Traceability
    themeNumber: 1
    section: RT.1
    sortOrder: 2

  # ── Plant protection & inputs ──
  - code: RT.2.1
    title: Only approved plant-protection products are used by trained operators
    summary: >-
      Plant-protection products are approved for the crop and use, and
      are applied by operators holding the required competence.
    theme: Plant Protection
    themeNumber: 2
    section: RT.2
    sortOrder: 3
  - code: RT.2.2
    title: Application equipment is calibrated and inspected
    summary: >-
      Sprayers and spreaders are tested, calibrated, and maintained so
      applications are accurate and within tolerance.
    theme: Plant Protection
    themeNumber: 2
    section: RT.2
    sortOrder: 4
  - code: RT.2.3
    title: Pre-harvest intervals are observed and recorded for every application
    summary: >-
      The interval between the last application and harvest meets the
      product's pre-harvest interval, and the observed interval is
      recorded.
    theme: Plant Protection
    themeNumber: 2
    section: RT.2
    sortOrder: 5

  # ── Nutrient management ──
  - code: RT.3.1
    title: Fertiliser and manure use follows a documented nutrient plan
    summary: >-
      Organic and manufactured fertiliser applications follow a written
      nutrient-management plan and the rates applied are recorded.
    theme: Nutrient Management
    themeNumber: 3
    section: RT.3
    sortOrder: 6

  # ── Storage of inputs ──
  - code: RT.4.1
    title: Plant-protection products and fuels are stored securely
    summary: >-
      Plant-protection products and fuels are kept in secure, bunded,
      and signed stores that prevent leakage and unauthorised access.
    theme: Input Storage
    themeNumber: 4
    section: RT.4
    sortOrder: 7

  # ── Crop storage & hygiene ──
  - code: RT.5.1
    title: Grain stores are clean, monitored, and free from contamination
    summary: >-
      Stores are cleaned before intake, monitored for temperature and
      pests, and protected from physical and chemical contamination.
    theme: Crop Storage
    themeNumber: 5
    section: RT.5
    sortOrder: 8
  - code: RT.5.2
    title: Stored-crop treatments and conditions are recorded
    summary: >-
      Any treatment applied in store and the monitored storage
      conditions (temperature, moisture) are recorded for each batch.
    theme: Crop Storage
    themeNumber: 5
    section: RT.5
    sortOrder: 9

  # ── Haulage & dispatch ──
  - code: RT.6.1
    title: Vehicles and containers are clean and fit before loading
    summary: >-
      Vehicles and containers used to move harvested crop are checked
      for cleanliness and suitability before loading, and the check is
      recorded.
    theme: Haulage and Dispatch
    themeNumber: 6
    section: RT.6
    sortOrder: 10

  # ── People & site ──
  - code: RT.7.1
    title: Workers are trained and a site risk assessment is maintained
    summary: >-
      Workers receive training relevant to their tasks and a current
      site risk assessment covers the main health, safety, and hygiene
      risks.
    theme: People and Site
    themeNumber: 7
    section: RT.7
    sortOrder: 11

templates:
  - code: RT-DEMO.1
    title: Cropping records and batch traceability
    category: Records and Traceability
    defaultFrequency: AD_HOC
    requirementCodes: [RT.1.1, RT.1.2]
  - code: RT-DEMO.2
    title: Plant-protection use, equipment, and pre-harvest intervals
    category: Plant Protection
    defaultFrequency: AD_HOC
    requirementCodes: [RT.2.1, RT.2.2, RT.2.3]
  - code: RT-DEMO.3
    title: Nutrient-management planning and records
    category: Nutrient Management
    defaultFrequency: ANNUALLY
    requirementCodes: [RT.3.1]
  - code: RT-DEMO.4
    title: Secure storage of plant-protection products and fuels
    category: Input Storage
    defaultFrequency: ANNUALLY
    requirementCodes: [RT.4.1]
  - code: RT-DEMO.5
    title: Grain-store hygiene and stored-crop records
    category: Crop Storage
    defaultFrequency: AD_HOC
    requirementCodes: [RT.5.1, RT.5.2]
  - code: RT-DEMO.6
    title: Haulage and dispatch vehicle checks
    category: Haulage and Dispatch
    defaultFrequency: AD_HOC
    requirementCodes: [RT.6.1]
  - code: RT-DEMO.7
    title: Worker training and site risk assessment
    category: People and Site
    defaultFrequency: ANNUALLY
    requirementCodes: [RT.7.1]

pack:
  key: RED-TRACTOR-DEMO-BASE
  name: Red Tractor Combinable Crops demo starter pack
  version: "2024-demo"
  description: >-
    Illustrative starter pack for the concept-only Red Tractor demo
    scheme — installs controls for traceability, plant protection,
    nutrient management, input storage, crop storage, haulage, and people
    above.
  templateCodes:
    [RT-DEMO.1, RT-DEMO.2, RT-DEMO.3, RT-DEMO.4, RT-DEMO.5, RT-DEMO.6, RT-DEMO.7]
